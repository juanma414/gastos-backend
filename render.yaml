services:
  - type: web
    name: gastos-backend
    env: node
    plan: free
    buildCommand: pnpm install && pnpm prisma:generate && pnpm build && pnpm prisma:migrate
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://gastos-pwa.netlify.app
