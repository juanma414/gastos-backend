services:
  - type: web
    name: gastos-backend
    env: node
    plan: free
    buildCommand: pnpm install && pnpm prisma:generate && pnpm build
    startCommand: pnpm prisma:deploy && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
